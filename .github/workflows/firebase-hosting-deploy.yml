name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  group: firebase-hosting-prod
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            app/package-lock.json

      - name: Install app deps
        working-directory: app
        run: npm ci --legacy-peer-deps

      - name: Build app
        working-directory: app
        env:
          # CRA treats warnings as errors when CI=true (default on GitHub Actions)
          CI: "false"
        run: npm run build

  deploy:
    name: Deploy (Production)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            app/package-lock.json

      - name: Install app deps
        working-directory: app
        run: npm ci --legacy-peer-deps

      - name: Build app
        working-directory: app
        env:
          CI: "false"
        run: npm run build

      - name: Deploy to Firebase Hosting (prod)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CONTROLE_DE_EQUIPAMENTOS_F2450 }}
          projectId: controle-de-equipamentos-f2450
          channelId: live
